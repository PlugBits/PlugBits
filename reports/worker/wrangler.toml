name = "plugbits-reports"
main = "src/index.ts"
compatibility_date = "2024-11-15"

[vars]
FONT_SOURCE_URL = "https://github.com/PlugBits/PlugBits/raw/refs/heads/main/reports/worker/src/fonts/NotoSansJP-BusinessSubset.ttf"
LATIN_FONT_URL = "https://github.com/PlugBits/PlugBits/raw/refs/heads/main/reports/worker/src/fonts/Roboto-Regular.ttf"
JP_FONT_FAMILY = "noto"

JP_FONT_BIZUD_URL = "https://github.com/googlefonts/morisawa-biz-ud-gothic/raw/main/fonts/ttf/BIZUDGothic-Regular.ttf"
JP_FONT_MPLUS_URL = "https://github.com/google/fonts/raw/main/ofl/mplus1p/MPLUS1p-Regular.ttf"

RENDER_MODE = "remote"
RENDERER_BASE_URL = "https://plugbits-reports-renderer-450917468567.asia-northeast1.run.app"
RENDERER_INTERNAL_TOKEN = "plugbits-123"
RENDERER_REQUEST_TIMEOUT_MS = "120000"
RENDERER_VERSION = "v1"

GCP_PROJECT_ID = "plugbits-reports"
GCP_REGION = "asia-northeast1"
CLOUD_RUN_RENDER_JOB_NAME = "plugbits-reports-renderer-job"
CLOUD_RUN_RENDER_JOB_REQUEST_TIMEOUT_MS = "120000"
CLOUD_RUN_RENDER_JOB_TASK_TIMEOUT = "900s"

[[kv_namespaces]]
binding = "TEMPLATE_KV"
id = "d624574989f54971a833e53bcd1ef268"
preview_id = "d624574989f54971a833e53bcd1ef268"

[[kv_namespaces]]
binding = "USER_TEMPLATES_KV"
id = "9728047520804d4486176feac5b08d9b"
preview_id = "9728047520804d4486176feac5b08d9b"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "3b05d3d272654fd29b488466eead6069"
preview_id = "3b05d3d272654fd29b488466eead6069"

[[kv_namespaces]]
binding = "RENDER_CACHE"
id = "bea534609bd6462ca55f8b20e63b336f"
preview_id = "bea534609bd6462ca55f8b20e63b336f"

[[r2_buckets]]
binding = "TENANT_ASSETS"
bucket_name = "tenant-assets"
preview_bucket_name = "tenant-assets"

[[queues.producers]]
binding = "RENDER_JOBS_QUEUE"
queue = "render-jobs"

[[queues.consumers]]
queue = "render-jobs"
max_batch_size = 1
max_batch_timeout = 5
