<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factory Tools — 工場管理ツール集</title>
  <meta name="description" content="レイアウト設計・検査図面・標準時間・計算ツールを無料で。製造現場向けブラウザツール集。" />
  <meta property="og:title" content="Factory Tools — 工場管理ツール集" />
  <meta property="og:description" content="レイアウト設計・検査図面・標準時間・計算ツールを無料で。製造現場向けブラウザツール集。" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://plugbits.app/assets/factory-tools/hero.png" />
  <meta name="theme-color" content="#0f1115" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1115;
      --sidebar-bg: #0c0e12;
      --panel: rgba(255,255,255,0.04);
      --panel-strong: rgba(255,255,255,0.07);
      --line: rgba(255,255,255,0.09);
      --text: #ffffff;
      --muted: #9aa0a6;
      --accent: #5f8cff;
      --accent-soft: rgba(95,140,255,0.14);
      --sidebar-w: 220px;
      --radius: 18px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      font-size: 15px;
    }

    .brand-icon {
      font-size: 22px;
      line-height: 1;
    }

    .brand-sub {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .nav {
      padding: 12px 8px;
      flex: 1;
    }

    .nav-section-label {
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover {
      background: var(--panel);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--accent-soft);
      color: var(--text);
      font-weight: 600;
    }

    .nav-icon { font-size: 16px; line-height: 1; flex-shrink: 0; }

    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Main ── */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid var(--line);
      background: rgba(15,17,21,0.8);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .topbar-title {
      font-weight: 700;
      font-size: 15px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lang-select {
      appearance: none;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .lang-select:focus { outline: none; border-color: var(--accent); }

    .topbar-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, transform 0.15s;
    }

    .topbar-link:hover {
      background: #7098ff;
      transform: translateY(-1px);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 48px;
    }

    /* ── Tool Section ── */
    .tool-section { display: none; }
    .tool-section.active { display: block; }

    .hero-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      margin-bottom: 22px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    .hero-card h1 {
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .hero-card p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 18px;
      max-width: 600px;
    }

    .launch-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.15s, opacity 0.15s;
      color: #fff;
    }

    .launch-btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .launch-blue { background: #1d4ed8; }
    .launch-green { background: #16a34a; }
    .launch-orange { background: #d97706; }
    .launch-purple { background: #7c3aed; }
    .launch-teal { background: #0d9488; }
    .launch-cyan { background: #0891b2; }

    /* ── Screenshots ── */
    .screenshot-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .screenshot-single {
      margin-bottom: 18px;
      max-width: 640px;
    }

    .screenshot-wrap {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      transition: border-color 0.2s, transform 0.2s;
    }

    .screenshot-wrap:hover {
      border-color: rgba(95,140,255,0.3);
      transform: translateY(-2px);
    }

    .screenshot-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── Feature grid ── */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .feature-card {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }

    .feature-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .feature-body strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .feature-body p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin: 0;
    }

    /* ── Mobile ── */
    .mobile-nav-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    @media (max-width: 720px) {
      body { overflow: auto; }

      .shell { flex-direction: column; overflow: visible; }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .nav { display: flex; padding: 8px; gap: 4px; overflow-x: auto; }
      .nav-section-label { display: none; }
      .nav-item { flex-direction: column; gap: 4px; min-width: 72px; text-align: center; font-size: 11px; padding: 8px 6px; }
      .nav-icon { font-size: 20px; }

      .workspace { overflow: visible; }
      .content { overflow: visible; padding: 20px 16px 40px; }

      .screenshot-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

    /* ── Tool base URLs ── */
    const TOOL_URLS = {
      layout:     'https://plugbits.github.io/factory-layout/',
      inspection: 'https://plugbits.github.io/inspection-marker/',
      calc:       'https://plugbits.github.io/ForgeKit/',
      st:         'https://plugbits.github.io/st-tool/',
      bgremover:  'https://plugbits.github.io/background-remover/',
      stp:        'https://plugbits.github.io/stp-viewer/',
    };

    const TOPBAR_KEYS = {
      layout: 'topbarLayout', inspection: 'topbarInspection', calc: 'topbarCalc', st: 'topbarSt', bgremover: 'topbarBgRemover', stp: 'topbarStp',
    };

    /* ── State ── */
    let currentLang = (() => {
      const urlLang = new URLSearchParams(location.search).get('lang');
      if (urlLang && I18N[urlLang]) { localStorage.setItem('ft_lang', urlLang); return urlLang; }
      return localStorage.getItem('ft_lang') || 'ja';
    })();
    let currentSection = 'layout';

    /* ── Apply i18n ── */
    function applyI18n() {
      const dict = I18N[currentLang] || I18N.ja;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (dict[key] !== undefined) el.textContent = dict[key];
      });
      document.getElementById('lang-select').value = currentLang;
      document.documentElement.lang = currentLang;
      // update topbar
      const dict2 = I18N[currentLang] || I18N.ja;
      document.getElementById('topbar-title').textContent = dict2[TOPBAR_KEYS[currentSection]] || '';
      document.getElementById('topbar-link-label').textContent = dict2.openTool || '';
      document.getElementById('topbar-link').href = TOOL_URLS[currentSection] + '?lang=' + currentLang;
      // update all section launch buttons
      document.querySelectorAll('.tool-link').forEach(a => {
        const tool = a.dataset.tool;
        if (tool) a.href = TOOL_URLS[tool] + '?lang=' + currentLang;
      });
    }

    /* ── Language switch ── */
    function setLanguage(lang) {
      if (!I18N[lang]) return;
      currentLang = lang;
      localStorage.setItem('ft_lang', lang);
      applyI18n();
    }

    /* ── Section switch ── */
    function showSection(key, btn) {
      document.querySelectorAll('.tool-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('section-' + key).classList.add('active');
      btn.classList.add('active');
      currentSection = key;
      applyI18n();
      const content = document.querySelector('.content');
      if (content) content.scrollTop = 0;
    }

    /* ── Init ── */
    applyI18n();
