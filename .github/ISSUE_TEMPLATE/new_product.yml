name: New product
description: Add a new plugin or extension to PlugBits
title: "[New] "
labels: [new-product]
assignees: []
body:
  # ---- 基本情報 ----
  - type: input
    id: slug
    attributes:
      label: slug (英数字とハイフン)
      description: URLに使われます。公開後は基本変更しないでください。
      placeholder: link-button
    validations: { required: true }

  - type: dropdown
    id: type
    attributes:
      label: 種別
      options:
        - plugin
        - extension
      default: 0
    validations: { required: true }

  - type: dropdown
    id: status
    attributes:
      label: 公開ステータス
      options:
        - public
        - coming-soon
        - unlisted
      default: 0
    validations: { required: true }

  - type: input
    id: page_url
    attributes:
      label: PAGE_URL（拡張機能のみ）
      description: type=extension の場合のみ。専用LPのURL。プラグインは空でOK。
      placeholder: /launcher/

  - type: input
    id: install_url
    attributes:
      label: INSTALL_URL
      description: インストール・ダウンロード先のURL。
      placeholder: https://chromewebstore.google.com/...

  - type: input
    id: brevo_form_id
    attributes:
      label: Brevo Form ID
      description: BrevoダウンロードフォームのID。未設定の場合はダウンロードモーダルにフォームが表示されません。
      placeholder: MUIFAPk-0SA3-DlRb...

  - type: input
    id: hero_image
    attributes:
      label: HERO_IMAGE（相対パス）
      description: 例）assets/link-button/hero.webp
      placeholder: assets/link-button/hero.webp
    validations: { required: true }

  - type: input
    id: file_size
    attributes:
      label: FILE_SIZE
      placeholder: ~15KB

  - type: input
    id: updated_at
    attributes:
      label: UPDATED_AT
      placeholder: 2025-03

  # ---- 日本語コンテンツ ----
  - type: input
    id: title_ja
    attributes: { label: TITLE_JA }
    validations: { required: true }

  - type: input
    id: short_summary_ja
    attributes:
      label: SHORT_SUMMARY_JA（カード表示用・64文字以内）
      placeholder: URLフィールドをボタンで開けるようにします
    validations: { required: true }

  - type: textarea
    id: summary_ja
    attributes: { label: SUMMARY_JA（詳細ページ用・160文字程度） }
    validations: { required: true }

  - type: input
    id: category_ja
    attributes: { label: CATEGORY_JA, placeholder: UI改善 }

  - type: input
    id: tags_ja
    attributes:
      label: TAGS_JA（カンマ区切り）
      placeholder: リンク, ボタン, 詳細画面

  - type: input
    id: supported_screens_ja
    attributes: { label: SUPPORTED_SCREENS_JA, placeholder: PC / 詳細 }

  - type: input
    id: features_ja
    attributes:
      label: FEATURES_JA（セミコロン区切り）
      placeholder: URLフィールドをボタン化;クリックで新規タブ表示

  - type: input
    id: limitations_ja
    attributes:
      label: LIMITATIONS_JA（セミコロン区切り）
      placeholder: モバイル非対応

  - type: textarea
    id: steps_ja
    attributes:
      label: STEPS_JA（1行ずつ「番号|見出し|本文」）
      placeholder: |
        1|プラグインをインストール|kintone管理画面からインストールします
        2|アプリに追加|設定画面でアプリを選択します
        3|完了|URLフィールドにボタンが表示されます

  - type: textarea
    id: faq_ja
    attributes:
      label: FAQ_JA（1行ずつ「質問|回答」）
      placeholder: |
        モバイルでも使えますか？|現在はPC専用です
        複数のURLフィールドに対応していますか？|1アプリ内の全URLフィールドに対応しています

  # ---- English content ----
  - type: input
    id: title_en
    attributes: { label: TITLE_EN }

  - type: input
    id: short_summary_en
    attributes:
      label: SHORT_SUMMARY_EN (for card display, under 64 chars)
      placeholder: Opens URL fields as clickable buttons

  - type: textarea
    id: summary_en
    attributes: { label: SUMMARY_EN (for detail page) }

  - type: input
    id: category_en
    attributes: { label: CATEGORY_EN, placeholder: UI Enhancement }

  - type: input
    id: tags_en
    attributes:
      label: TAGS_EN (comma-separated)
      placeholder: link, button, detail view

  - type: input
    id: supported_screens_en
    attributes: { label: SUPPORTED_SCREENS_EN, placeholder: PC / Detail }

  - type: input
    id: features_en
    attributes:
      label: FEATURES_EN (semicolon-separated)
      placeholder: Turns URL fields into buttons;Opens in a new tab on click

  - type: input
    id: limitations_en
    attributes:
      label: LIMITATIONS_EN (semicolon-separated)
      placeholder: PC only

  - type: textarea
    id: steps_en
    attributes:
      label: STEPS_EN (one per line "No|Heading|Body")
      placeholder: |
        1|Install the plugin|Install from the kintone admin panel
        2|Add to your app|Select the app in settings
        3|Done|A button appears on URL fields

  - type: textarea
    id: faq_en
    attributes:
      label: FAQ_EN (one per line "Question|Answer")
      placeholder: |
        Does it work on mobile?|PC only at this time
        Multiple URL fields supported?|Yes, all URL fields in an app are supported
